{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Job | Rainbow Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,800;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/admin_dashboard.css' %}">
    <style>
        body { background-color: #050810; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .navbar-admin { background: rgba(13, 17, 23, 0.95); border-bottom: 1px solid rgba(255, 193, 7, 0.2); backdrop-filter: blur(10px); }
        .edit-card { background: linear-gradient(145deg, #161b22, #0d1117); border: 1px solid rgba(255, 193, 7, 0.3); border-top: 4px solid #ffc107; border-radius: 16px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .premium-input { background-color: rgba(0,0,0,0.3) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; padding: 12px; border-radius: 8px;}
        .premium-input:focus { border-color: #ffc107 !important; box-shadow: 0 0 0 4px rgba(255, 193, 7, 0.1) !important; }
        select.premium-input option { background-color: #161b22; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top navbar-admin py-3 shadow">
        <div class="container-fluid px-4">
            <a class="navbar-brand text-white fw-bold" href="{% url 'manage_jobs' %}"><i class="bi bi-arrow-left me-2"></i>Back to Jobs</a>
        </div>
    </nav>

    <main class="container py-5" style="margin-top: 80px;">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="edit-card">
                    <h2 class="text-white fw-bold mb-4" style="font-family: 'Playfair Display', serif;">Edit: <span class="text-gold">{{ job.title }}</span></h2>
                    
                    <form action="" method="POST">
                        {% csrf_token %}
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="text-gold small mb-1 fw-bold text-uppercase">Job Title *</label>
                                <input type="text" name="title" class="form-control premium-input" value="{{ job.title }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="text-gold small mb-1 fw-bold text-uppercase">Category *</label>
                                <select name="category" class="form-control premium-input" required>
                                    {% for cat in categories %}
                                        <option value="{{ cat.id }}" {% if job.category.id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="text-gold small mb-1 fw-bold text-uppercase">Company Name</label>
                                <input type="text" name="company_name" class="form-control premium-input" value="{{ job.company_name|default:'' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="text-gold small mb-1 fw-bold text-uppercase">Location *</label>
                                <input type="text" name="location" class="form-control premium-input" value="{{ job.location }}" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="text-gold small mb-1 fw-bold text-uppercase">Salary Range (INR) *</label>
                                <input type="text" name="salary" class="form-control premium-input" value="{{ job.salary }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="text-gold small mb-1 fw-bold text-uppercase">Contact Phone/Email *</label>
                                <input type="text" name="contact_info" class="form-control premium-input" value="{{ job.contact_info }}" required>
                            </div>

                            <div class="col-md-4">
                                <label class="text-gold small mb-1 fw-bold text-uppercase">Gender</label>
                                <select name="gender" class="form-control premium-input">
                                    <option value="Any" {% if job.gender == 'Any' %}selected{% endif %}>Male / Female</option>
                                    <option value="Male" {% if job.gender == 'Male' %}selected{% endif %}>Male Only</option>
                                    <option value="Female" {% if job.gender == 'Female' %}selected{% endif %}>Female Only</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="text-gold small mb-1 fw-bold text-uppercase">Timing</label>
                                <input type="text" name="timing" class="form-control premium-input" value="{{ job.timing|default:'' }}">
                            </div>
                            <div class="col-md-4">
                                <label class="text-gold small mb-1 fw-bold text-uppercase">Experience Level</label>
                                <input type="text" name="experience" class="form-control premium-input" value="{{ job.experience|default:'' }}">
                            </div>

                            <div class="col-12">
                                <label class="text-gold small mb-1 fw-bold text-uppercase">Main Job Description *</label>
                                <textarea name="description" class="form-control premium-input" rows="4" required>{{ job.description }}</textarea>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="text-gold small mb-1 fw-bold text-uppercase">Requirements</label>
                                <textarea name="requirements" class="form-control premium-input" rows="3">{{ job.requirements|default:'' }}</textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="text-gold small mb-1 fw-bold text-uppercase">Benefits</label>
                                <textarea name="benefits" class="form-control premium-input" rows="3">{{ job.benefits|default:'' }}</textarea>
                            </div>

                            <div class="col-12 mt-4 pt-3 border-top border-secondary border-opacity-25">
                                <div class="form-check form-switch d-flex align-items-center gap-2">
                                    <input class="form-check-input" type="checkbox" name="is_urgent" id="urgentSwitch" {% if job.is_urgent %}checked{% endif %}>
                                    <label class="form-check-label text-warning fw-bold mb-0" for="urgentSwitch">
                                        <i class="bi bi-megaphone-fill me-1"></i> Mark as URGENT VACANCY
                                    </label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-end gap-3 mt-5">
                            <a href="{% url 'manage_jobs' %}" class="btn btn-outline-light opacity-75 rounded-pill px-4">Cancel</a>
                            <button type="submit" class="btn btn-gold rounded-pill px-5 fw-bold shadow">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
